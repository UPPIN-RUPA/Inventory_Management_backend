# Spring Application Name
spring.application.name=Inventory_Management
spring.config.import=optional:file:.env[.properties]

# MySQL Database Connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/inventory_management}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Server Port Configuration
server.port=8080                         

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Basic auth user for mutating endpoints
app.security.username=${APP_SECURITY_USERNAME:admin}
app.security.password=${APP_SECURITY_PASSWORD:change-me}

# Logging Configuration
logging.level.root=INFO                   
logging.level.org.springframework=INFO    

# JSON Parsing and Error Handling
spring.jackson.serialization.indent-output=true

# CORS Configuration
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:*}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
