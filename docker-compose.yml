services:
  mysql:
    image: mysql:8.4
    container_name: inventory-management-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: inventory_management
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-your_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-data:
